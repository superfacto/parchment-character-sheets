  <title>Parchment (offline / single file)</title>
  <style>
/* Parchment — aged paper + ink + a single oxblood accent (SPEC §8.3).
   Bold in one place, quiet everywhere else. System font stack, no CDN. */
:root {
  /* Default "5e Sheet" scheme — warm cream paper, near-black ink, boxed dark
     rules, single oxblood accent. Alternate schemes override these below via
     [data-theme=...] on <html>. */
  --ink: #221c12;
  --paper: #ece3cf;
  --card: #fbf6ea;
  --line: #c2b49a;
  --muted: #857a63;
  --oxblood: #7a2b2b;
  --surround: #c7ba9e;              /* area around the phone frame */
  --sheen: rgba(255,255,255,0.5);   /* top gloss inside the frame */
  /* Heavier, darker box border — derived from ink so it adapts per theme. */
  --border: color-mix(in srgb, var(--ink) 26%, var(--line));
  --radius: 9px;
  --gap: 10px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  /* Serif display face for the printed-character-sheet feel (big numbers,
     headings, dice). Self-hosted system serifs only — no web fonts. */
  --display: "Iowan Old Style", "Palatino Linotype", Palatino, "Book Antiqua", Georgia, serif;
}

/* --- Alternate colour schemes (user-selectable in Settings) --------------- */
[data-theme="midnight"] {
  --ink: #ece6da; --paper: #221d19; --card: #2c2622; --line: #42382f; --muted: #9c8f7f;
  --oxblood: #d0704a; --surround: #0e0b09; --sheen: rgba(255,255,255,0.04);
}
[data-theme="forest"] {
  --ink: #212a1d; --paper: #e7ece0; --card: #f7faf2; --line: #bac6aa; --muted: #78846b;
  --oxblood: #436f3c; --surround: #c7cfbe;
}
[data-theme="ocean"] {
  --ink: #1c2530; --paper: #e5ecf0; --card: #f4f9fb; --line: #a9bac6; --muted: #6c7c86;
  --oxblood: #256b7a; --surround: #bcc7cf;
}
[data-theme="rose"] {
  --ink: #2c2125; --paper: #f3e8eb; --card: #fdf7f9; --line: #d7bac2; --muted: #8a757e;
  --oxblood: #a63b5e; --surround: #dcc7cc;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font);
  color: var(--ink);
  background: var(--surround);
  overscroll-behavior: none;
}
button {
  font-family: inherit; color: inherit; cursor: pointer;
  touch-action: manipulation;            /* kill the 300ms tap delay / double-tap zoom */
  -webkit-user-select: none; user-select: none;  /* no text/emoji selection on long-press */
  -webkit-touch-callout: none;           /* no iOS long-press callout menu */
}
/* Tappable non-button elements get the same fast-tap behaviour. */
.wdg.tappable, .charrow, .tab { touch-action: manipulation; }
input, textarea, select { font-family: inherit; font-size: 16px; }

#app { height: 100%; }

/* Phone frame — on wide screens, show a centered device; on a phone, fill. */
.frame {
  position: relative;
  max-width: 460px;
  margin: 0 auto;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--paper);
  background-image:
    radial-gradient(120% 120% at 50% 0%, var(--sheen), transparent 60%);
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  overflow: hidden;
}
@media (min-width: 480px) {
  body { padding: 18px 0; }
  #app { height: calc(100% - 36px); }
  .frame { border-radius: 30px; border: 1px solid var(--line); }
}

/* Faint graph-paper grid: only in edit mode, fades in play mode (§8.3). */
.sheet {
  position: relative;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--gap);
  scroll-behavior: smooth;
}
.sheet::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 22px 22px;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.frame.edit .sheet::before { opacity: 0.35; }

/* App bar */
.appbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px calc(12px + env(safe-area-inset-top)) 14px;
  padding-top: max(12px, env(safe-area-inset-top));
  border-bottom: 1px solid var(--line);
  background: linear-gradient(var(--paper), rgba(239,233,221,0.85));
  backdrop-filter: blur(6px);
}
.appbar .name { font-family: var(--display); flex: 1; font-weight: 650; font-size: 18px; letter-spacing: 0.2px; }
.appbar .name .sub { display: block; font-weight: 400; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.iconbtn {
  border: 1px solid var(--line); background: var(--card);
  width: 44px; height: 44px; border-radius: var(--radius);
  font-size: 18px; display: grid; place-items: center; padding: 0;
}
.iconbtn:active { transform: scale(0.94); }

/* Play/Edit toggle */
.toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; background: var(--card); overflow: hidden; }
.toggle button { border: 0; background: transparent; padding: 0 16px; min-height: 44px; font-size: 14px; font-weight: 600; color: var(--muted); }
.toggle button.on { background: var(--oxblood); color: #fff; }

/* Page tabs + dots */
.pagebar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--line); overflow-x: auto; }
.tab { flex: none; display: inline-flex; align-items: center; min-height: 44px; border: 1px solid var(--line); background: var(--card); padding: 0 16px; border-radius: 999px; font-size: 14px; color: var(--muted); }
.tab.on { color: var(--ink); border-color: var(--ink); font-weight: 600; }
.tab.add { color: var(--oxblood); border-style: dashed; }
.dots { display: flex; gap: 6px; justify-content: center; padding: 8px 0 4px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--line); }
.dot.on { background: var(--oxblood); }

/* Widget grid — responsive 2-col stack (§8.1) */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); align-content: start; }
.wdg {
  position: relative;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  min-height: 64px;
  padding: 10px 12px;
  display: flex; flex-direction: column; justify-content: center;
  box-shadow: 0 1px 0 rgba(0,0,0,0.03);
}
.wdg.tappable { cursor: pointer; }
.wdg.tappable:active { transform: scale(0.985); }
.wdg .wl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
.wdg .wv { font-family: var(--display); font-size: 30px; font-weight: 650; line-height: 1.05; margin-top: 2px; }
.wdg .wv.text { font-size: 18px; font-weight: 550; }
.wdg .ws { font-size: 12px; color: var(--muted); margin-top: 2px; }
.wdg .marker { position: absolute; top: 8px; right: 10px; font-size: 13px; color: var(--oxblood); }
.wdg .wv.err { color: var(--oxblood); font-size: 20px; }
.wdg.num input {
  width: 100%; border: 0; background: transparent; font-size: 30px; font-weight: 650;
  color: var(--ink); padding: 0; margin-top: 2px; -moz-appearance: textfield;
}
.wdg.num input:focus { outline: none; border-bottom: 2px solid var(--oxblood); }
.wdg .editnum { position: absolute; bottom: 6px; right: 8px; border: 1px solid var(--line); background: var(--paper); border-radius: 6px; font-size: 13px; line-height: 1; padding: 6px 9px; color: var(--muted); }
.wdg .editnum:active { transform: scale(0.92); }
.wdg input.inlinenum { width: 100%; border: 0; border-bottom: 2px solid var(--oxblood); background: transparent; font-size: 30px; font-weight: 650; color: var(--ink); padding: 0; margin-top: 2px; -moz-appearance: textfield; }
.wdg input.inlinenum:focus { outline: none; }
.wdg textarea { width: 100%; border: 0; background: transparent; resize: none; color: var(--ink); font-size: 15px; }
.wdg textarea:focus { outline: none; }
.wdg.label { background: transparent; border: 0; box-shadow: none; min-height: 0; padding: 12px 4px 2px; justify-content: end; }
.wdg.label .lbl { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--oxblood); font-weight: 700; border-bottom: 1px solid var(--line); padding-bottom: 6px; }

/* span helpers */
.c2 { grid-column: span 2; }
.r2 { grid-row: span 2; }
.r3 { grid-row: span 3; }

/* Edit-mode widget chrome — index cards */
.frame.edit .wdg { border-style: dashed; }
.wdg .drag { position: absolute; top: 2px; left: 2px; color: var(--muted); font-size: 15px; cursor: grab; padding: 6px 9px; touch-action: none; }
.wdg .editrow { position: absolute; bottom: 6px; right: 8px; display: flex; gap: 6px; align-items: center; }
.szchip { border: 1px solid var(--line); background: var(--paper); border-radius: 6px; font-size: 10px; font-weight: 700; padding: 1px 5px; color: var(--muted); }
.wdg .cfg { border: 1px solid var(--line); background: var(--paper); border-radius: 6px; font-size: 13px; padding: 7px 11px; min-height: 34px; }
.wdg .cfg:active { transform: scale(0.94); }
/* Invisible hit-area expanders so the small corner affordances hit ~44px on touch. */
.wdg .editnum::after, .wdg .drag::after, .wdg .cfg::after { content: ""; position: absolute; inset: -10px; }
.wdg .cfg { position: relative; }
.wdg.editing { padding-top: 22px; }
.wdg.dragging { opacity: 0.4; }
.wdg.dragover { outline: 2px solid var(--oxblood); outline-offset: 1px; }
.addtile {
  grid-column: span 2; border: 1.5px dashed var(--oxblood); background: transparent;
  border-radius: var(--radius); color: var(--oxblood); font-weight: 600; padding: 14px; font-size: 14px;
}

/* FAB */
.fab {
  position: absolute; right: 16px; bottom: 16px; z-index: 5;
  border: 0; background: var(--oxblood); color: #fff; border-radius: 999px;
  padding: 14px 18px; font-weight: 650; font-size: 14px; box-shadow: 0 6px 18px rgba(122,43,43,0.4);
}

/* Overlays / bottom sheets */
.scrim { position: fixed; inset: 0; background: rgba(30,26,22,0.5); display: grid; place-items: end center; z-index: 20; animation: fade 0.15s ease; }
.scrim.center { place-items: center; }
@keyframes fade { from { opacity: 0; } }
.sheetcard {
  width: 100%; max-width: 460px; background: var(--paper);
  border-radius: 18px 18px 0 0; padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 40px rgba(0,0,0,0.3); animation: rise 0.2s ease;
  max-height: 88%; overflow-y: auto;
}
.scrim.center .sheetcard { border-radius: 18px; margin: 16px; }
@keyframes rise { from { transform: translateY(30px); } }
.sheetcard h2 { font-family: var(--display); margin: 0 0 4px; font-size: 18px; }
.sheetcard h2 + .desc { color: var(--muted); font-size: 13px; margin: 0 0 14px; }

/* Roll result */
.rollbig { font-family: var(--display); font-size: 52px; font-weight: 700; text-align: center; color: var(--oxblood); margin: 4px 0 8px; min-height: 56px; font-variant-numeric: tabular-nums; transition: opacity 0.15s ease; }
.rollbig.rolling { opacity: 0.4; }
.rollbreak { font-family: var(--mono); text-align: center; font-size: 15px; color: var(--ink); background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; transition: opacity 0.25s ease; }
.rollbreak.pending { opacity: 0; }
.rollbreak .op { color: var(--muted); }

/* Dice tray + tumbling dice (cosmetic; the value is the engine's real roll) */
.dice-tray { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; min-height: 60px; margin: 12px 0 6px; }
.die {
  width: 56px; height: 56px; border-radius: 14px; position: relative;
  display: grid; place-items: center; background: var(--card);
  border: 2.5px solid var(--oxblood); color: var(--ink); font-weight: 700;
  box-shadow: 0 2px 5px rgba(0,0,0,0.12);   /* flat, single soft shadow */
}
.die .dieface { font-family: var(--display); font-size: 25px; font-variant-numeric: tabular-nums; line-height: 1; }
.die .dielabel { position: absolute; bottom: 3px; right: 6px; font-size: 9px; font-weight: 700; color: var(--muted); }
.die.rolling { animation: die-wiggle 0.32s ease-in-out infinite; }
.die.settle { animation: die-pop 0.28s ease; }
@keyframes die-wiggle {   /* quick flat jitter, like the Google dice roller */
  0%   { transform: rotate(0deg) translateY(0); }
  20%  { transform: rotate(-12deg) translateY(-3px); }
  40%  { transform: rotate(10deg) translateY(0); }
  60%  { transform: rotate(-7deg) translateY(-2px); }
  80%  { transform: rotate(5deg) translateY(0); }
  100% { transform: rotate(0deg) translateY(0); }
}
@keyframes die-pop { 0% { transform: scale(0.82); } 60% { transform: scale(1.13); } 100% { transform: scale(1); } }
@media (prefers-reduced-motion: reduce) { .die.rolling { animation: none; } }

/* Appearance / theme picker */
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
.theme-opt { display: flex; align-items: center; gap: 10px; text-align: left; border: 1px solid var(--line); border-radius: var(--radius); background: var(--card); padding: 10px; min-height: 60px; }
.theme-opt.on { border-color: var(--oxblood); box-shadow: 0 0 0 1px var(--oxblood); }
.theme-opt:active { transform: scale(0.98); }
.theme-preview { flex: none; width: 40px; height: 40px; border-radius: 9px; overflow: hidden; display: flex; border: 1px solid rgba(0,0,0,0.12); }
.theme-preview i { flex: 1; }
.theme-nm { font-weight: 600; font-size: 14px; }
.theme-opt .chk { margin-left: auto; color: var(--oxblood); font-weight: 700; }

/* Settings toggle switch */
.toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
.switch { flex: none; width: 52px; height: 30px; border-radius: 999px; border: 1px solid var(--line); background: var(--card); position: relative; padding: 0; transition: background 0.15s ease, border-color 0.15s ease; }
.switch .knob { position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; border-radius: 50%; background: var(--muted); transition: left 0.16s ease, background 0.16s ease; }
.switch.on { background: var(--oxblood); border-color: var(--oxblood); }
.switch.on .knob { left: 24px; background: #fff; }

/* Detail overlay — the value shown big */
.detail-val { font-family: var(--display); font-size: 42px; font-weight: 700; text-align: center; color: var(--oxblood); margin: 4px 0 10px; font-variant-numeric: tabular-nums; word-break: break-word; }
.detail-val.err { font-size: 24px; }

/* Weapon / multi-roll face: a computed summary per roll (auto-updating) */
.rollrows { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
.rollrow { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.rollrow .rn { font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); font-weight: 700; }
.rollrow .rp { font-size: 16px; font-weight: 700; font-variant-numeric: tabular-nums; }
.detail-rolls { margin: 6px 0 12px; gap: 8px; }
.detail-rolls .rn { font-size: 12px; }
.detail-rolls .rp { font-size: 22px; }

/* Stacked action buttons (detail: one Roll button per roll, then Close) */
.btncol { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
.btncol .btn { flex: none; width: 100%; }

/* Rolls repeater in the value editor */
.rolledit { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.rolledit .rn-in { flex: 0 0 32%; width: auto; }
.rolledit .re-in { flex: 1; width: auto; }
.rolledit .rrm { flex: none; width: 40px; height: 44px; padding: 0; border: 1px solid var(--line); background: var(--card); border-radius: var(--radius); color: var(--oxblood); font-size: 20px; line-height: 1; }

/* Detail overlay */
.formula { font-family: var(--mono); background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; font-size: 15px; }
.formula .err { color: var(--oxblood); }

/* Forms */
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 5px; }
.field input, .field select, .field textarea {
  width: 100%; min-height: 44px; padding: 11px 12px; border: 1px solid var(--line); border-radius: var(--radius);
  background: var(--card); color: var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--oxblood); }
.field input.locked { background: #efeae0; color: var(--muted); font-family: var(--mono); }
.field .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
.field .hint.err { color: var(--oxblood); }
.seg { display: flex; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.seg button { flex: 1; border: 0; background: var(--card); min-height: 44px; padding: 8px; font-size: 14px; color: var(--muted); }
.seg button.on { background: var(--oxblood); color: #fff; font-weight: 600; }
.seg.small button { min-height: 42px; padding: 6px; font-size: 12px; }

.btnrow { display: flex; gap: 10px; margin-top: 8px; }
.btn { flex: 1; min-height: 48px; border: 1px solid var(--line); background: var(--card); border-radius: var(--radius); padding: 12px; font-weight: 600; font-size: 15px; }
.btn:active { transform: scale(0.98); }
.btn.primary { background: var(--oxblood); color: #fff; border-color: var(--oxblood); }
.btn.ghost { background: transparent; }
.btn.danger { color: var(--oxblood); }
.btn.destruct { background: var(--oxblood); color: #fff; border-color: var(--oxblood); }

/* Character list (home) */
.home { padding: 14px; overflow-y: auto; flex: 1; }
.home-hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.home h1 { font-family: var(--display); font-size: 22px; margin: 6px 4px 2px; }
.home .tagline { color: var(--muted); font-size: 13px; margin: 0 4px 16px; }
.warnbanner { background: color-mix(in srgb, var(--oxblood) 10%, var(--card)); border: 1px solid color-mix(in srgb, var(--oxblood) 30%, var(--line)); color: color-mix(in srgb, var(--ink) 72%, var(--oxblood)); border-radius: var(--radius); padding: 10px 12px; font-size: 12px; margin-bottom: 14px; display: flex; gap: 8px; }
.charrow { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
.charrow.active { border-color: var(--oxblood); }
.charrow .activedot { width: 9px; height: 9px; border-radius: 50%; background: var(--line); flex: none; }
.charrow.active .activedot { background: var(--oxblood); }
.charrow .cmeta { flex: 1; }
.charrow .cname { font-weight: 650; font-size: 16px; }
.charrow .csub { color: var(--muted); font-size: 12px; margin-top: 2px; }
.charrow .cgo { color: var(--muted); font-size: 18px; }
.charrow .rowdel { flex: none; width: 44px; height: 44px; border: 1px solid var(--line); background: var(--paper); border-radius: 8px; font-size: 16px; color: var(--muted); display: grid; place-items: center; padding: 0; }
.charrow .rowdel:active { transform: scale(0.92); }

.menu-list { display: flex; flex-direction: column; }
.menu-list button { text-align: left; border: 0; border-bottom: 1px solid var(--line); background: transparent; padding: 14px 4px; font-size: 15px; display: flex; gap: 12px; align-items: center; }
.menu-list button:last-child { border-bottom: 0; }
.menu-list .mi { width: 22px; text-align: center; }

.pill { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; background: var(--paper); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; color: var(--muted); }

.empty { text-align: center; color: var(--muted); padding: 40px 20px; }

/* Privacy page */
.privsec { margin-top: 16px; }
.privsec h3 { font-size: 14px; font-weight: 650; margin: 0 0 4px; color: var(--ink); }
.privsec p { font-size: 13px; line-height: 1.55; color: var(--muted); margin: 0; word-break: break-word; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 10px 16px; border-radius: 999px; font-size: 13px; z-index: 50; animation: fade 0.2s ease; }

  </style>

  <div id="app"></div>
  <input id="file-input" type="file" accept="application/json,.json" hidden />
  <script>
(function(){
"use strict";
// ===== engine.js =====
// Parchment engine — the two-context math kernel (SPEC §6).
// Tokenizer -> shunting-yard -> RPN evaluator. No eval(), ever.
//
// Two contexts share one grammar; the roll context adds the NdM dice primitive.
// Calc formulas MUST NOT contain dice (that would let randomness into the
// deterministic dependency graph). The tokenizer flags dice tokens; the calc
// path rejects them at parse time.

class FormulaError extends Error {}

const FUNCTIONS = {
  floor: { arity: 1, fn: (a) => Math.floor(a) },
  ceil:  { arity: 1, fn: (a) => Math.ceil(a) },
  round: { arity: 1, fn: (a) => Math.round(a) },
  abs:   { arity: 1, fn: (a) => Math.abs(a) },
  sign:  { arity: 1, fn: (a) => Math.sign(a) },
  min:   { arity: 'var', fn: (...xs) => Math.min(...xs) },
  max:   { arity: 'var', fn: (...xs) => Math.max(...xs) },
  clamp: { arity: 3, fn: (x, lo, hi) => Math.min(Math.max(x, lo), hi) },
};

const OPS = {
  '+': { prec: 2, assoc: 'L', fn: (a, b) => a + b },
  '-': { prec: 2, assoc: 'L', fn: (a, b) => a - b },
  '*': { prec: 3, assoc: 'L', fn: (a, b) => a * b },
  '/': { prec: 3, assoc: 'L', fn: (a, b) => (b === 0 ? 0 : a / b) },
  '%': { prec: 3, assoc: 'L', fn: (a, b) => (b === 0 ? 0 : a % b) },
};

// --- Tokenizer -------------------------------------------------------------
// Token kinds: number, ref, func, op, lparen, rparen, comma, dice, uminus
function tokenize(src, { allowDice } = { allowDice: false }) {
  const tokens = [];
  let i = 0;
  const s = src;
  const isDigit = (c) => c >= '0' && c <= '9';
  const isIdentStart = (c) => /[a-z]/i.test(c) || c === '_';
  const isIdentPart = (c) => /[a-z0-9_]/i.test(c);

  while (i < s.length) {
    const c = s[i];
    if (c === ' ' || c === '\t' || c === '\n' || c === '\r') { i++; continue; }

    if (isDigit(c) || (c === '.' && isDigit(s[i + 1]))) {
      let j = i;
      while (j < s.length && (isDigit(s[j]) || s[j] === '.')) j++;
      // A leading integer may be a dice literal: NdM(kh|kl)K
      if (allowDice && s[j] === 'd' && isDigit(s[j + 1])) {
        let k = j + 1;
        while (k < s.length && isDigit(s[k])) k++;
        let keep = null;
        if (s[k] === 'k' && (s[k + 1] === 'h' || s[k + 1] === 'l')) {
          const kind = s[k + 1] === 'h' ? 'kh' : 'kl';
          let m = k + 2;
          while (m < s.length && isDigit(s[m])) m++;
          keep = { kind, n: parseInt(s.slice(k + 2, m) || '1', 10) };
          k = m;
        }
        const count = parseInt(s.slice(i, j), 10);
        const sides = parseInt(s.slice(j + 1, keep ? s.indexOf('k', j) : k), 10);
        tokens.push({ type: 'dice', text: s.slice(i, k), count, sides, keep });
        i = k;
        continue;
      }
      const text = s.slice(i, j);
      if (text.split('.').length > 2) throw new FormulaError(`Bad number "${text}"`);
      tokens.push({ type: 'number', value: parseFloat(text), text });
      i = j;
      continue;
    }

    if (isIdentStart(c)) {
      let j = i;
      while (j < s.length && isIdentPart(s[j])) j++;
      const word = s.slice(i, j);
      // A "d" glued to digits was handled above; a bare identifier like "d20"
      // is just a ref. Functions are recognised by a following '('.
      if (FUNCTIONS[word] && s[j] === '(') {
        tokens.push({ type: 'func', name: word });
      } else {
        tokens.push({ type: 'ref', name: word, text: word });
      }
      i = j;
      continue;
    }

    if (c === '(') { tokens.push({ type: 'lparen' }); i++; continue; }
    if (c === ')') { tokens.push({ type: 'rparen' }); i++; continue; }
    if (c === ',') { tokens.push({ type: 'comma' }); i++; continue; }

    if (OPS[c]) {
      // Unary minus: '-' at start, or after an operator / '(' / ','.
      const prev = tokens[tokens.length - 1];
      const unary = c === '-' && (!prev || prev.type === 'op' || prev.type === 'uminus' ||
        prev.type === 'lparen' || prev.type === 'comma' || prev.type === 'func');
      tokens.push(unary ? { type: 'uminus' } : { type: 'op', op: c });
      i++;
      continue;
    }

    throw new FormulaError(`Unexpected character "${c}"`);
  }
  return tokens;
}

// --- Shunting-yard: tokens -> RPN -----------------------------------------
function toRPN(tokens) {
  const out = [];
  const stack = [];
  const argc = []; // argument counters for functions

  for (const t of tokens) {
    switch (t.type) {
      case 'number':
      case 'ref':
      case 'dice':
        out.push(t);
        break;
      case 'func':
        stack.push(t);
        argc.push(1);
        break;
      case 'comma':
        while (stack.length && stack[stack.length - 1].type !== 'lparen') out.push(stack.pop());
        if (!stack.length) throw new FormulaError('Misplaced comma');
        argc[argc.length - 1]++;
        break;
      case 'uminus':
        stack.push(t); // treated like a right-assoc high-prec unary op
        break;
      case 'op': {
        const o1 = OPS[t.op];
        while (stack.length) {
          const top = stack[stack.length - 1];
          if (top.type === 'uminus') { out.push(stack.pop()); continue; }
          if (top.type === 'op') {
            const o2 = OPS[top.op];
            if (o2.prec > o1.prec || (o2.prec === o1.prec && o1.assoc === 'L')) {
              out.push(stack.pop());
              continue;
            }
          }
          break;
        }
        stack.push(t);
        break;
      }
      case 'lparen':
        stack.push(t);
        break;
      case 'rparen': {
        while (stack.length && stack[stack.length - 1].type !== 'lparen') out.push(stack.pop());
        if (!stack.length) throw new FormulaError('Mismatched parenthesis');
        stack.pop(); // discard lparen
        if (stack.length && stack[stack.length - 1].type === 'func') {
          const fn = stack.pop();
          fn.nargs = argc.pop();
          out.push(fn);
        }
        break;
      }
      default:
        throw new FormulaError(`Unknown token ${t.type}`);
    }
  }
  while (stack.length) {
    const top = stack.pop();
    if (top.type === 'lparen' || top.type === 'rparen') throw new FormulaError('Mismatched parenthesis');
    out.push(top);
  }
  return out;
}

// --- RPN evaluator ---------------------------------------------------------
// resolve(name) -> number, or throws FormulaError for unknown refs.
// rollDice(token) -> { value, rolls } used only in the roll context.
function evalRPN(rpn, { resolve, rollDice, onLeaf }) {
  const st = [];
  for (const t of rpn) {
    switch (t.type) {
      case 'number':
        st.push(t.value);
        break;
      case 'ref': {
        const v = resolve(t.name);
        if (onLeaf) onLeaf({ label: t.name, value: v });
        st.push(v);
        break;
      }
      case 'dice': {
        if (!rollDice) throw new FormulaError('Dice not allowed here');
        const { value, rolls } = rollDice(t);
        if (onLeaf) onLeaf({ label: t.text, rolls, value });
        st.push(value);
        break;
      }
      case 'uminus':
        if (st.length < 1) throw new FormulaError('Bad expression');
        st.push(-st.pop());
        break;
      case 'op': {
        if (st.length < 2) throw new FormulaError('Bad expression');
        const b = st.pop(); const a = st.pop();
        st.push(OPS[t.op].fn(a, b));
        break;
      }
      case 'func': {
        const spec = FUNCTIONS[t.name];
        const n = spec.arity === 'var' ? t.nargs : spec.arity;
        if (spec.arity !== 'var' && t.nargs !== spec.arity)
          throw new FormulaError(`${t.name}() expects ${spec.arity} args`);
        if (st.length < n) throw new FormulaError('Bad expression');
        const args = st.splice(st.length - n, n);
        st.push(spec.fn(...args));
        break;
      }
      default:
        throw new FormulaError(`Cannot evaluate ${t.type}`);
    }
  }
  if (st.length !== 1) throw new FormulaError('Bad expression');
  return st[0];
}

function rollDice(t, rng = Math.random) {
  const rolls = [];
  for (let k = 0; k < t.count; k++) rolls.push(1 + Math.floor(rng() * t.sides));
  let kept = rolls;
  if (t.keep) {
    const sorted = [...rolls].sort((a, b) => a - b);
    kept = t.keep.kind === 'kh' ? sorted.slice(sorted.length - t.keep.n) : sorted.slice(0, t.keep.n);
  }
  return { value: kept.reduce((a, b) => a + b, 0), rolls };
}

// Extract the value-id refs a formula depends on (for the dependency graph).
function refsOf(formula) {
  const tokens = tokenize(formula, { allowDice: false });
  const set = new Set();
  for (const t of tokens) if (t.type === 'ref') set.add(t.name);
  return [...set];
}

// Compile a calc formula. Throws FormulaError (incl. on any dice token).
function compileCalc(formula) {
  // Tokenize WITH dice recognition so an NdM literal is caught and rejected —
  // the grammar wall (SPEC §6) forbids randomness in the deterministic graph.
  if (tokenize(formula, { allowDice: true }).some((t) => t.type === 'dice'))
    throw new FormulaError('Dice not allowed in a formula');
  return toRPN(tokenize(formula, { allowDice: false }));
}

// Evaluate a calc RPN. resolve(name) supplies dependency values.
function evalCalc(rpn, resolve) {
  return evalRPN(rpn, { resolve });
}

// Evaluate a roll expression -> structured breakdown (SPEC §6.4).
function evalRoll(expr, resolve, rng = Math.random) {
  const rpn = toRPN(tokenize(expr, { allowDice: true }));
  const parts = [];
  const total = evalRPN(rpn, {
    resolve,
    rollDice: (t) => rollDice(t, rng),
    onLeaf: (p) => parts.push(p),
  });
  return { total, parts, display: renderRoll(parts, total) };
}

function renderRoll(parts, total) {
  const segs = parts.map((p) =>
    p.rolls ? `${p.label} (${p.rolls.join('+')})` : `${p.label} (${p.value})`
  );
  return `${segs.join(' + ')} = ${total}`;
}

// A static, auto-updating summary of a roll for a widget face, e.g. "1d20 + 5"
// or "1d8 + 3". The dice notation is kept literal; the non-dice terms are
// evaluated (dice treated as 0) into a single flat modifier via `resolve`.
function previewRoll(expr, resolve) {
  let tokens;
  try { tokens = tokenize(expr, { allowDice: true }); } catch { return '?'; }
  const dice = tokens.filter((t) => t.type === 'dice').map((t) => t.text);
  let flat = NaN;
  try { flat = evalRPN(toRPN(tokens), { resolve, rollDice: () => ({ value: 0, rolls: [] }) }); } catch { flat = NaN; }
  if (!dice.length) return Number.isFinite(flat) ? String(flat) : '?';
  const dicePart = dice.join(' + ');
  if (!Number.isFinite(flat) || flat === 0) return dicePart;
  return `${dicePart} ${flat > 0 ? '+' : '−'} ${Math.abs(flat)}`;
}

// --- Character graph: compute all calc values (topo sort + cycle detect) ---
// values: array of Value objects. Returns Map(id -> number|string|'ERR')
// plus a details map for tap-detail (formula / error message).
function computeAll(values) {
  const byId = new Map(values.map((v) => [v.id, v]));
  const results = new Map();
  const details = new Map(); // id -> { formula?, error? , breakdown? }
  const compiled = new Map();

  // Seed literal (number/text) values.
  for (const v of values) {
    if (v.kind === 'number') results.set(v.id, typeof v.value === 'number' ? v.value : 0);
    else if (v.kind === 'text') results.set(v.id, v.text ?? '');
  }

  // Precompile calc formulas; a parse error is a per-value ERR.
  const deps = new Map();
  for (const v of values) {
    if (v.kind !== 'calc') continue;
    try {
      compiled.set(v.id, compileCalc(v.formula || ''));
      deps.set(v.id, refsOf(v.formula || ''));
    } catch (e) {
      results.set(v.id, 'ERR');
      details.set(v.id, { error: e.message });
    }
  }

  // Cycle detection via DFS colouring, over calc nodes only.
  const state = new Map(); // white(undef)/gray(1)/black(2)
  const inCycle = new Set();
  function visit(id, stack) {
    if (state.get(id) === 2) return;
    if (state.get(id) === 1) {
      // Found a back-edge: everything from the first occurrence is a cycle.
      const from = stack.indexOf(id);
      for (const n of stack.slice(from)) inCycle.add(n);
      return;
    }
    if (!byId.get(id) || byId.get(id).kind !== 'calc') return; // leaf ref
    if (!compiled.has(id)) return; // parse-errored node
    state.set(id, 1);
    stack.push(id);
    for (const d of deps.get(id) || []) visit(d, stack);
    stack.pop();
    state.set(id, 2);
  }
  for (const id of compiled.keys()) if (!state.has(id)) visit(id, []);

  for (const id of inCycle) {
    results.set(id, 'ERR');
    details.set(id, { error: `Cycle: ${id} depends on itself` });
  }

  // Evaluate remaining calc nodes in dependency order (memoised recursion).
  function evalNode(id) {
    if (results.has(id)) return results.get(id);
    const v = byId.get(id);
    if (!v) { results.set(id, 'ERR'); details.set(id, { error: `Unknown value "${id}"` }); return 'ERR'; }
    if (v.kind !== 'calc') { const r = results.get(id) ?? 0; return r; }
    if (!compiled.has(id)) return 'ERR';
    try {
      const val = evalCalc(compiled.get(id), (name) => {
        const r = evalNode(name);
        if (r === 'ERR' || typeof r !== 'number') throw new FormulaError(`Bad ref "${name}"`);
        return r;
      });
      results.set(id, val);
      details.set(id, { formula: v.formula });
      return val;
    } catch (e) {
      results.set(id, 'ERR');
      details.set(id, { error: e.message });
      return 'ERR';
    }
  }
  for (const id of compiled.keys()) if (!inCycle.has(id)) evalNode(id);

  return { results, details };
}

function dnd5eCharacter(name = 'New Hero') {
  const values = [];

  values.push({ id: 'char_class', label: 'Class', kind: 'text', text: 'Fighter', group: 'Bio' });
  values.push({ id: 'level', label: 'Level', kind: 'number', value: 1, group: 'Bio' });

  for (const [id, label] of ABILITIES) {

  }
  for (const [id, label, ab] of ABILITIES.map((a) => [`${a[2]}_mod`, `${a[2].toUpperCase()} Mod`, a[0]])) {
    values.push({ id, label, kind: 'calc', formula: `floor((${ab} - 10) / 2)`, group: 'Abilities' });
  }

  values.push({ id: 'armor_class', label: 'AC', kind: 'calc', formula: '10 + dex_mod', group: 'Combat' });

  values.push({ id: 'hp_current', label: 'HP', kind: 'number', value: 10, group: 'Combat' });
  values.push({ id: 'hp_max', label: 'Max HP', kind: 'number', value: 10, group: 'Combat' });

  // Saving throws — raw ability mods in v1 (proficiency deferred to v1.1).
  for (const [, , ab] of ABILITIES) {
    values.push({ id: `save_${ab}`, label: `${ab.toUpperCase()} Save`, kind: 'calc', formula: `${ab}_mod`, group: 'Saves' });
  }

  for (const [id, label, ab] of SKILLS) {
    values.push({ id, label, kind: 'calc', formula: `${ab}_mod`, group: 'Skills' });
  }

  // Example weapons demonstrating the roll model.
  values.push({ id: 'longsword', label: 'Longsword', kind: 'text', text: 'Longsword', description: 'Versatile (1d10). Melee, 5 ft.', group: 'Attacks',
    rolls: [{ name: 'Attack', expr: '1d20 + str_mod + proficiency_bonus' }, { name: 'Damage', expr: '1d8 + str_mod' }] });
  values.push({ id: 'shortbow', label: 'Shortbow', kind: 'text', text: 'Shortbow', description: 'Ranged, 80/320 ft.', group: 'Attacks',
    rolls: [{ name: 'Attack', expr: '1d20 + dex_mod + proficiency_bonus' }, { name: 'Damage', expr: '1d6 + dex_mod' }] });

  const w = (o) => ({ kind: 'bound', cols: 1, rows: 1, tap: 'none', ...o, id: newId('w') });

  const pages = [
    {
      id: newId('page'), name: 'Core',
      widgets: [
        w({ ref: 'char_class', secondaryRef: 'level', cols: 2, tap: 'none' }),
        w({ ref: 'strength', secondaryRef: 'str_mod', tap: 'detail', rollOverride: '1d20 + str_mod' }),
        w({ ref: 'dexterity', secondaryRef: 'dex_mod', tap: 'detail', rollOverride: '1d20 + dex_mod' }),
        w({ ref: 'constitution', secondaryRef: 'con_mod', tap: 'detail', rollOverride: '1d20 + con_mod' }),
        w({ ref: 'intelligence', secondaryRef: 'int_mod', tap: 'detail', rollOverride: '1d20 + int_mod' }),
        w({ ref: 'wisdom', secondaryRef: 'wis_mod', tap: 'detail', rollOverride: '1d20 + wis_mod' }),
        w({ ref: 'charisma', secondaryRef: 'cha_mod', tap: 'detail', rollOverride: '1d20 + cha_mod' }),
        w({ ref: 'proficiency_bonus', tap: 'detail' }),
        w({ ref: 'armor_class', tap: 'detail' }),
        w({ ref: 'hp_current', secondaryRef: 'hp_max', cols: 2, tap: 'none' }),
      ],
    },
    {
      id: newId('page'), name: 'Combat',
      widgets: [
        w({ ref: 'armor_class', tap: 'detail' }),
        w({ ref: 'initiative', tap: 'detail', rollOverride: '1d20 + initiative' }),
        w({ ref: 'hp_current', secondaryRef: 'hp_max', cols: 2, tap: 'none' }),
        w({ kind: 'label', title: 'Saving Throws', cols: 2 }),
        w({ ref: 'save_str', tap: 'detail', rollOverride: '1d20 + save_str' }),
        w({ ref: 'save_dex', tap: 'detail', rollOverride: '1d20 + save_dex' }),
        w({ ref: 'save_con', tap: 'detail', rollOverride: '1d20 + save_con' }),
        w({ ref: 'save_wis', tap: 'detail', rollOverride: '1d20 + save_wis' }),
        w({ kind: 'label', title: 'Attacks', cols: 2 }),
        w({ ref: 'longsword', cols: 2, tap: 'detail' }),
        w({ ref: 'shortbow', cols: 2, tap: 'detail' }),
      ],
    },
    {
      id: newId('page'), name: 'Skills',
      widgets: [
        w({ kind: 'label', title: 'Skills (roll a check)', cols: 2 }),
        ...SKILLS.map(([id]) => w({ ref: id, tap: 'detail', rollOverride: `1d20 + ${id}` })),
      ],
    },
  ];

  return {
    id: newId('char'),
    name,
    preset: 'dnd5e',
    createdAt: new Date().toISOString(),
    values,
    pages,
  };
}

function blankCharacter(name = 'New Character') {

}

// ===== store.js =====
// Persistence & sharing (SPEC §7). Local save-file blob + JSON export/import.

const KEY = 'parchment.savefile.v1';
const THEME_KEY = 'parchment.theme';
const SCHEMA_VERSION = 1;

// App appearance preference (separate from character data).
function loadTheme() {
  try { return localStorage.getItem(THEME_KEY) || 'parchment'; } catch { return 'parchment'; }
}
function saveTheme(id) {
  try { localStorage.setItem(THEME_KEY, id); } catch { /* private mode */ }
}

const ANIM_KEY = 'parchment.rollAnim';
function loadRollAnim() {
  try { return localStorage.getItem(ANIM_KEY) !== 'off'; } catch { return true; }
}
function saveRollAnim(on) {
  try { localStorage.setItem(ANIM_KEY, on ? 'on' : 'off'); } catch { /* private mode */ }
}

function emptySave() {
  return { schemaVersion: SCHEMA_VERSION, exportedAt: null, activeCharacterId: null, characters: [] };
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return emptySave();
    const data = JSON.parse(raw);
    if (!data.characters) return emptySave();
    return data;
  } catch {
    return emptySave();
  }
}

let saveTimer = null;
function save(state) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(KEY, JSON.stringify(state));
    } catch (e) {
      console.error('Autosave failed', e);
    }
  }, 250);
}

// Immediate synchronous write — use for destructive/structural changes so a
// quick reload can't lose them (the debounced save() may not have fired yet).
function saveNow(state) {
  clearTimeout(saveTimer);
  try {
    localStorage.setItem(KEY, JSON.stringify(state));
  } catch (e) {
    console.error('Save failed', e);
  }
}

// --- Export ---------------------------------------------------------------
function stamp(char) {
  const slug = (char?.name || 'parchment').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const date = new Date().toISOString().slice(0, 10);
  return `${slug}-${date}`;
}

function exportCharacter(char) {
  const blob = { schemaVersion: SCHEMA_VERSION, exportedAt: new Date().toISOString(), activeCharacterId: char.id, characters: [char] };
  return { filename: `parchment-${stamp(char)}.json`, json: JSON.stringify(blob, null, 2) };
}

function exportEverything(state) {
  const blob = { ...state, exportedAt: new Date().toISOString() };
  return { filename: `parchment-backup-${new Date().toISOString().slice(0, 10)}.json`, json: JSON.stringify(blob, null, 2) };
}

// A pack: values (and optionally a page). Here we export one character's
// values + all its pages as a portable layout+values pack.
function exportPack(char, name = char.name) {
  const pack = {
    kind: 'pack',
    name,
    createdWith: 'parchment/0.1',
    values: char.values,
    pages: char.pages,
  };
  return { filename: `parchment-pack-${stamp({ name })}.json`, json: JSON.stringify(pack, null, 2) };
}

function download(filename, json) {
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// --- Import ---------------------------------------------------------------
// Returns { type, warnings, apply(state) } — apply mutates a copy and returns it.
function analyzeImport(data) {
  if (data && data.schemaVersion && data.schemaVersion > SCHEMA_VERSION) {
    return { type: 'refused', reason: `File schema v${data.schemaVersion} is newer than this app (v${SCHEMA_VERSION}). Update the app first.` };
  }
  if (data && data.kind === 'pack') return { type: 'pack', pack: data };
  if (data && Array.isArray(data.characters)) return { type: 'savefile', save: data };
  return { type: 'invalid', reason: 'Unrecognised file — not a Parchment save file or pack.' };
}

// Import a save file: add all characters, never overwrite; reassign ids on collision.
function importSaveFile(state, incoming) {
  const existing = new Set(state.characters.map((c) => c.id));
  const added = [];
  for (const c of incoming.characters) {
    let char = c;
    if (existing.has(c.id)) char = { ...c, id: newId('char'), name: c.name };
    existing.add(char.id);
    state.characters.push(char);
    added.push(char.id);
  }
  if (!state.activeCharacterId && added.length) state.activeCharacterId = added[0];
  return { added };
}

// Import a pack into a character, non-destructively (SPEC §7.3).
// On value-id collision, import under a suffixed id and rewrite references
// inside the pack's own formulas/rolls/widgets so it stays internally consistent.
function importPackInto(char, pack, { mode = 'suffix', addPages = true } = {}) {
  const existing = new Set(char.values.map((v) => v.id));
  const rename = new Map();
  const incoming = [];

  for (const v of pack.values) {
    if (!existing.has(v.id)) { incoming.push(v); existing.add(v.id); continue; }
    if (mode === 'skip') continue;
    // suffix
    let i = 2, nid = `${v.id}_${i}`;
    while (existing.has(nid)) { i++; nid = `${v.id}_${i}`; }
    rename.set(v.id, nid);
    existing.add(nid);
    incoming.push({ ...v, id: nid });
  }

  const rewrite = (expr) => {
    if (!expr) return expr;
    let out = expr;
    for (const [from, to] of rename) out = out.replace(new RegExp(`\\b${from}\\b`, 'g'), to);
    return out;
  };
  for (const v of incoming) {
    if (v.formula) v.formula = rewrite(v.formula);
    if (v.roll) v.roll = rewrite(v.roll);
  }

  char.values.push(...incoming);

  if (addPages && Array.isArray(pack.pages)) {
    for (const p of pack.pages) {
      const page = {
        id: newId('page'),
        name: p.name || 'Imported',
        widgets: (p.widgets || []).map((w) => ({
          ...w,
          id: newId('w'),
          ref: rename.get(w.ref) || w.ref,
          secondaryRef: rename.get(w.secondaryRef) || w.secondaryRef,
          rollOverride: rewrite(w.rollOverride),
        })),
      };
      char.pages.push(page);
    }
  }
  return { addedValues: incoming.length, renamed: rename.size };
}


const store = { SCHEMA_VERSION, emptySave, load, save, saveNow, loadTheme, saveTheme,
  loadRollAnim, saveRollAnim, exportCharacter, exportEverything, exportPack, download,
  analyzeImport, importSaveFile, importPackInto };

// ===== app.js =====
// Parchment — app shell & UI (SPEC groups A/B/C). Vanilla JS, no framework.

// --- tiny DOM helper -------------------------------------------------------
function el(tag, props = {}, children = []) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k === 'text') node.textContent = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (v === true) node.setAttribute(k, '');
    else if (v !== false && v != null) node.setAttribute(k, v);
  }
  for (const c of [].concat(children)) if (c != null && c !== false) node.append(c.nodeType ? c : document.createTextNode(c));
  return node;
}
const $ = (sel) => document.querySelector(sel);

// --- state -----------------------------------------------------------------
const state = {
  save: store.load(),
  view: 'home',        // 'home' | 'sheet'
  mode: 'play',        // 'play' | 'edit'
  pageIndex: 0,
  overlay: null,       // { type, ... }
  toast: null,

};

// Selectable colour schemes. sw = [paper, ink, accent] for the picker preview.
const THEMES = [
  { id: 'parchment', name: '5e Sheet', sw: ['#ece3cf', '#221c12', '#7a2b2b'] },
  { id: 'midnight',  name: 'Midnight',  sw: ['#221d19', '#ece6da', '#d0704a'] },
  { id: 'forest',    name: 'Forest',    sw: ['#e7ece0', '#212a1d', '#436f3c'] },
  { id: 'ocean',     name: 'Ocean',     sw: ['#e5ecf0', '#1c2530', '#256b7a'] },
  { id: 'rose',      name: 'Rose',      sw: ['#f3e8eb', '#2c2125', '#a63b5e'] },
];
function applyTheme(id) {
  const t = THEMES.find((x) => x.id === id) || THEMES[0];
  if (t.id === 'parchment') delete document.documentElement.dataset.theme;
  else document.documentElement.dataset.theme = t.id;
  const meta = document.querySelector('meta[name=theme-color]');
  if (meta) meta.content = t.sw[2];   // accent drives the browser UI colour
}

function activeChar() {
  return state.save.characters.find((c) => c.id === state.save.activeCharacterId) || null;
}
function commit() {
  store.save(state.save);
  render();
}
// Like commit(), but writes synchronously — for deletes and other destructive
// changes that must survive an immediate reload.
function commitNow() {
  store.saveNow(state.save);
  render();
}
function toast(msg) {
  state.toast = msg;
  render();
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { state.toast = null; render(); }, 1800);
}

// Computed-value cache for the active character (recomputed each render; the
// kernel is fast and calc results are never persisted — SPEC §6.3).
let computed = { results: new Map(), details: new Map() };
function recompute() {
  const c = activeChar();
  computed = c ? computeAll(c.values) : { results: new Map(), details: new Map() };
}
function valueById(id) { return activeChar()?.values.find((v) => v.id === id); }

// A value's rolls, normalised to [{name, expr}]. Supports the multi-roll
// `rolls` array (weapons: Attack + Damage), the legacy single `roll` string,
// and a widget-level `rollOverride` when the value itself carries no roll.
function rollsFor(v, w) {
  if (v?.rolls?.length) return v.rolls.filter((r) => r && r.expr);
  if (v?.roll) return [{ name: '', expr: v.roll }];
  if (w?.rollOverride) return [{ name: '', expr: w.rollOverride }];
  return [];
}
// resolve used by previewRoll: numeric computed values only, else bail to dice-only.
function rollResolve(name) {
  const r = computed.results.get(name);
  if (typeof r === 'number') return r;
  throw new Error(`bad ref ${name}`);
}
// Sensible defaults when binding a new widget to a value: rollable/calc values
// open the detail panel; a weapon (text + rolls) goes full-width.
function newBoundWidget(v) {
  const hasRolls = !!(v.rolls?.length || v.roll);
  const isWeapon = v.kind === 'text' && hasRolls;
  return { id: newId('w'), kind: 'bound', ref: v.id, cols: isWeapon ? 2 : 1, rows: 1, tap: (hasRolls || v.kind === 'calc') ? 'detail' : 'none' };
}
// Scaffold a "weapon" value (text + Attack/Damage rolls) and a full-width widget.
function addWeapon(page) {
  const c = activeChar();
  const name = prompt('Weapon name?', 'Longsword');
  if (name == null) return;
  const nm = name.trim() || 'Weapon';
  const base = (nm.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '')) || 'weapon';
  let id = base, i = 2;
  while (c.values.some((x) => x.id === id)) id = `${base}_${i++}`;
  const abilityMod = c.values.some((x) => x.id === 'str_mod') ? 'str_mod' : '0';
  const prof = c.values.some((x) => x.id === 'proficiency_bonus') ? ' + proficiency_bonus' : '';
  const val = {
    id, label: nm, kind: 'text', text: nm, description: '', group: 'Attacks',
    rolls: [{ name: 'Attack', expr: `1d20 + ${abilityMod}${prof}` }, { name: 'Damage', expr: `1d8 + ${abilityMod}` }],
  };
  c.values.push(val);
  page.widgets.push(newBoundWidget(val));
  commit();
  openValueEditor(val); // open so the dice/ability can be tweaked immediately
}

// --- render dispatch -------------------------------------------------------
function render() {
  recompute();
  const app = $('#app');
  app.innerHTML = '';
  // Overlays/toasts live on <body>, not inside #app — clear the stale ones so
  // closing an overlay actually removes it (and re-renders don't stack copies).
  document.querySelectorAll('body > .scrim, body > .toast').forEach((n) => n.remove());
  const frame = el('div', { class: `frame ${state.mode === 'edit' && state.view === 'sheet' ? 'edit' : ''}` });
  if (state.view === 'home' || !activeChar()) frame.append(renderHome());
  else frame.append(...renderSheet());
  app.append(frame);
  if (state.overlay) document.body.append(renderOverlay());
  if (state.toast) document.body.append(el('div', { class: 'toast', text: state.toast }));
}

// ======================================================================= HOME
function renderHome() {
  const wrap = el('div', { class: 'home' });
  wrap.append(el('div', { class: 'home-hd' }, [

  wrap.append(el('div', { class: 'warnbanner' }, [

        ]),
      ]),

      el('div', { class: 'cgo', text: '›' }),
    ]);

  }

  wrap.append(el('div', { style: 'display:flex;gap:10px;margin-top:16px' }, [

  container.append(el('button', { class: 'fab', text: '+ New', onclick: openNewCharacter }));

function openCharacter(id) {
  state.save.activeCharacterId = id;
  state.view = 'sheet';
  state.pageIndex = 0;
  state.mode = 'play';
  commit();
}

// ====================================================================== SHEET
function renderSheet() {
  const c = activeChar();
  const page = c.pages[Math.min(state.pageIndex, c.pages.length - 1)] || c.pages[0];

  // App bar
  const appbar = el('div', { class: 'appbar' }, [
    el('button', { class: 'iconbtn', text: '☰', onclick: openMenu }),
    el('div', { class: 'name' }, [c.name, el('span', { class: 'sub', text: c.preset || 'custom' })]),
    el('div', { class: 'toggle' }, [
      el('button', { class: state.mode === 'play' ? 'on' : '', text: 'Play', onclick: () => { state.mode = 'play'; render(); } }),
      el('button', { class: state.mode === 'edit' ? 'on' : '', text: 'Edit', onclick: () => { state.mode = 'edit'; render(); } }),
    ]),
  ]);

  // Page tabs
  const pagebar = el('div', { class: 'pagebar' });
  c.pages.forEach((p, i) => {
    pagebar.append(el('button', {
      class: `tab ${i === state.pageIndex ? 'on' : ''}`, text: p.name,
      onclick: () => { state.pageIndex = i; render(); },
      ...(state.mode === 'edit' ? { ondblclick: () => renamePage(p) } : {}),
    }));
  });
  if (state.mode === 'edit') pagebar.append(el('button', { class: 'tab add', text: '+ Page', onclick: addPage }));

  // Sheet body
  const sheet = el('div', { class: 'sheet' });
  const grid = el('div', { class: 'grid' });
  page.widgets.forEach((w, i) => grid.append(renderWidget(w, i, page)));
  if (state.mode === 'edit') grid.append(el('button', { class: 'addtile', text: '+ Add widget', onclick: () => openAddWidget(page) }));
  sheet.append(grid);

  // Dots indicator
  if (c.pages.length > 1) {
    const dots = el('div', { class: 'dots' });
    c.pages.forEach((_, i) => dots.append(el('div', { class: `dot ${i === state.pageIndex ? 'on' : ''}` })));
    sheet.append(dots);
  }

  enableSwipe(sheet, c.pages.length);
  return [appbar, pagebar, sheet];
}

function renderWidget(w, index, page) {
  if (w.kind === 'label') {
    const node = el('div', { class: 'wdg label c2' }, [el('div', { class: 'lbl', text: w.title || 'Section' })]);
    if (state.mode === 'edit') decorateEdit(node, w, index, page);
    return node;
  }

  const v = valueById(w.ref);
  const spanClass = `${(w.cols || 1) >= 2 ? 'c2' : ''} ${w.rows === 2 ? 'r2' : w.rows >= 3 ? 'r3' : ''}`;
  const node = el('div', { class: `wdg ${spanClass}` });

  if (!v) {
    node.append(el('div', { class: 'wl', text: w.ref || '—' }), el('div', { class: 'wv err', text: 'ERR' }));
    if (state.mode === 'edit') decorateEdit(node, w, index, page);
    return node;
  }

  const label = w.title || v.label;
  node.append(el('div', { class: 'wl', text: label }));

  const rolls = rollsFor(v, w);
  // Display face derived from bound value kind (§9).
  const numberHasTap = v.kind === 'number' && w.tap && w.tap !== 'none';
  // A text value carrying rolls (a weapon/item) shows a computed roll summary
  // on its face — name + "1d20 + 5" / "1d8 + 3" — instead of the raw string.
  const weaponFace = v.kind === 'text' && rolls.length && state.mode === 'play';
  if (weaponFace) {
    const rows = el('div', { class: 'rollrows' });
    rolls.forEach((r) => rows.append(el('div', { class: 'rollrow' }, [
      el('span', { class: 'rn', text: r.name || 'Roll' }),
      el('span', { class: 'rp', text: previewRoll(r.expr, rollResolve) }),
    ])));
    node.append(rows);
  } else if (v.kind === 'number' && state.mode === 'play' && !numberHasTap) {
    // No tap action → the number is directly editable inline (quick HP edits etc).
    node.classList.add('num');
    const input = el('input', {
      type: 'number', value: v.value ?? 0, inputmode: 'numeric',
      onchange: (e) => { v.value = e.target.value === '' ? 0 : Number(e.target.value); commit(); },
    });
    input.addEventListener('click', (e) => e.stopPropagation());
    node.append(input);
  } else if (numberHasTap && state.mode === 'play') {
    // Tap is reserved for the roll/detail action; editing is via the ✎ affordance
    // (SPEC §9: "editable inline via tap-hold or an edit affordance").
    node.append(el('div', { class: 'wv', text: String(v.value ?? 0) }));
    const pencil = el('button', { class: 'editnum', text: '✎', title: 'Edit value' });
    pencil.addEventListener('click', (e) => { e.stopPropagation(); editNumberInline(node, v); });
    node.append(pencil);
  } else if (v.kind === 'text' && (w.rows || 1) >= 2 && state.mode === 'play' && w.tap === 'none') {
    const ta = el('textarea', { rows: (w.rows || 2) * 2, oninput: (e) => { v.text = e.target.value; store.save(state.save); } }, []);
    ta.value = v.text || '';
    ta.addEventListener('click', (e) => e.stopPropagation());
    node.append(ta);
  } else {
    const disp = displayValue(v);
    node.append(el('div', { class: `wv ${v.kind === 'text' ? 'text' : ''} ${disp === 'ERR' ? 'err' : ''}`, text: disp }));
  }

  if (w.secondaryRef && !weaponFace) {
    const s = valueById(w.secondaryRef);
    if (s) node.append(el('div', { class: 'ws', text: `${s.label}: ${displayValue(s)}` }));
  }

  // Tap markers. Default tap opens the detail panel (which carries a Roll
  // button per roll); tap:'roll' with a single roll is the opt-in insta-roll.
  if (state.mode === 'play' && w.tap && w.tap !== 'none') {
    node.append(el('div', { class: 'marker', text: rolls.length ? '🎲' : 'ⓘ' }));
    node.classList.add('tappable');
    node.addEventListener('click', () => {
      if (w.tap === 'roll' && rolls.length === 1) openRoll(v, rolls[0].expr, label);
      else openDetail(v, label, rolls);
    });
  }

  if (state.mode === 'edit') decorateEdit(node, w, index, page);
  return node;
}

function displayValue(v) {
  if (v.kind === 'calc') { const r = computed.results.get(v.id); return r === undefined ? 'ERR' : String(r); }
  if (v.kind === 'text') return v.text || '—';
  return String(v.value ?? 0);
}

// Swap a read-only number face for an inline editor (used when the widget's
// plain tap is reserved for a roll/detail action).
function editNumberInline(node, v) {
  const wv = node.querySelector('.wv');
  if (!wv) return;
  const input = el('input', { class: 'inlinenum', type: 'number', inputmode: 'numeric' });
  input.value = v.value ?? 0;
  wv.replaceWith(input);
  input.focus(); input.select();
  input.addEventListener('click', (e) => e.stopPropagation());
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
  input.addEventListener('blur', () => { v.value = input.value === '' ? 0 : Number(input.value); commit(); }, { once: true });
}

// --- edit-mode widget chrome ----------------------------------------------
function decorateEdit(node, w, index, page) {
  node.classList.add('editing');
  node.classList.remove('num');
  // replace any live input face with a static one in edit mode
  const handle = el('div', { class: 'drag', text: '⠿', title: 'Drag to reorder' });
  node.prepend(handle);
  node.append(el('div', { class: 'editrow' }, [
    el('button', { class: 'cfg', text: 'Edit', onclick: (e) => { e.stopPropagation(); openWidgetConfig(w, page); } }),
  ]));
  enableDragReorder(node, handle, index, page);
}

// --- pointer-based drag reorder (works on touch + mouse) -------------------
let drag = null;
function enableDragReorder(node, handle, index, page) {
  handle.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    drag = { page, from: index, node };
    node.classList.add('dragging');
    const move = (ev) => {
      const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.wdg');
      document.querySelectorAll('.wdg.dragover').forEach((n) => n.classList.remove('dragover'));
      if (target && target !== node) target.classList.add('dragover');
    };
    const up = (ev) => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const target = document.elementFromPoint(ev.clientX, ev.clientY)?.closest('.wdg');
      const cards = [...node.parentNode.querySelectorAll('.wdg')];
      const to = target ? cards.indexOf(target) : -1;
      if (to >= 0 && to !== index) {
        const [moved] = page.widgets.splice(index, 1);
        page.widgets.splice(to, 0, moved);
        commit();
      } else { node.classList.remove('dragging'); render(); }
      drag = null;
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  });
}

// --- horizontal page swipe -------------------------------------------------
function enableSwipe(sheet, pageCount) {
  let x0 = null, y0 = null;
  sheet.addEventListener('touchstart', (e) => { x0 = e.touches[0].clientX; y0 = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', (e) => {
    if (x0 == null) return;
    const dx = e.changedTouches[0].clientX - x0;
    const dy = e.changedTouches[0].clientY - y0;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
      if (dx < 0 && state.pageIndex < pageCount - 1) { state.pageIndex++; render(); }
      else if (dx > 0 && state.pageIndex > 0) { state.pageIndex--; render(); }
    }
    x0 = null;
  }, { passive: true });
}

// ==================================================================== OVERLAYS
function closeOverlay() { state.overlay = null; render(); }
function renderOverlay() {

}

// A2 — Roll result
function openRoll(v, expr, label) {
  const doRoll = () => evalRoll(expr, (name) => {
    const r = computed.results.get(name);
    if (typeof r === 'number') return r;
    throw new Error(`bad ref ${name}`);
  });
  let result;
  try { result = doRoll(); } catch { result = { total: 'ERR', display: 'unknown reference', parts: [] }; }
  state.overlay = {
    center: true,
    render() {
      const tray = el('div', { class: 'dice-tray' });
      const bigEl = el('div', { class: 'rollbig' });
      const breakEl = el('div', { class: 'rollbreak' });
      const ctx = { tray, bigEl, breakEl, res: result, timers: [] };
      const play = (res) => { ctx.res = res; breakEl.innerHTML = formatBreak(res); animateRoll(diceFromParts(res.parts), ctx); };
      const rollAgain = () => { let res; try { res = doRoll(); } catch { res = { total: 'ERR', display: '—', parts: [] }; } play(res); };
      requestAnimationFrame(() => play(result)); // element is in the DOM by now
      return sheetCard([
        el('h2', { text: `${label} — Roll` }),
        el('p', { class: 'desc', text: expr }),
        tray, bigEl, breakEl,
        el('div', { class: 'btnrow' }, [
          el('button', { class: 'btn primary', text: '🎲 Roll again', onclick: rollAgain }),
          el('button', { class: 'btn ghost', text: 'Close', onclick: closeOverlay }),
        ]),
      ]);
    },
  };
  render();
}

// Expand a roll breakdown into individual dice ({sides, val}) for the tray.
function diceFromParts(parts) {
  const out = [];
  for (const p of (parts || [])) {
    if (!p.rolls) continue;
    const m = /d(\d+)/i.exec(p.label);
    const sides = m ? +m[1] : 6;
    p.rolls.forEach((val) => out.push({ sides, val }));
  }
  return out;
}

// Flat dice that wiggle while the face number flickers, then settle on the real
// value (the value is the engine's; the flicker is cosmetic). Honours the
// user's animation toggle and the OS reduced-motion setting.
function animateRoll(dice, ctx) {
  ctx.timers.forEach((t) => { clearInterval(t); clearTimeout(t); });
  ctx.timers = [];
  const { tray, bigEl, breakEl } = ctx;
  tray.innerHTML = '';
  const faces = dice.map((d) => {
    const face = el('span', { class: 'dieface', text: String(d.val) });
    tray.append(el('div', { class: `die` }, [face, el('span', { class: 'dielabel', text: 'd' + d.sides })]));
    return face;
  });
  const dieEls = [...tray.querySelectorAll('.die')];
  const setFinal = () => {
    dieEls.forEach((d, i) => { d.classList.remove('rolling'); d.style.animationDelay = ''; faces[i].textContent = String(dice[i].val); d.classList.add('settle'); });
    bigEl.classList.remove('rolling'); bigEl.textContent = String(ctx.res.total);
    breakEl.classList.remove('pending');
  };
  const animate = state.rollAnim && dice.length && !window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!animate) { setFinal(); return; }
  bigEl.classList.add('rolling'); bigEl.textContent = '…';
  breakEl.classList.add('pending');
  dieEls.forEach((d, i) => { d.classList.add('rolling'); d.style.animationDelay = (i * 60) + 'ms'; });
  const iv = setInterval(() => {
    faces.forEach((f, i) => { f.textContent = String(1 + Math.floor(Math.random() * dice[i].sides)); });
  }, 55);
  ctx.timers.push(iv);
  ctx.timers.push(setTimeout(() => { clearInterval(iv); setFinal(); }, 720));
}
function formatBreak(res) {
  if (!res.parts || !res.parts.length) return res.display || '—';
  const segs = res.parts.map((p) => p.rolls ? `${p.label} <b>(${p.rolls.join('+')})</b>` : `${p.label} <b>(${p.value})</b>`);
  return `${segs.join('<span class="op"> + </span>')}<span class="op"> = </span><b>${res.total}</b>`;
}

// A3 — Detail. Shows the value + its formula/description, and a Roll button per

  state.overlay = {

  render();
}

const SLUG_RE = /^[a-z][a-z0-9_]*$/;
function openValueEditor(existing, onCreate) {
  const c = activeChar();
  const creating = !existing;
  // working copy
  const v = existing || { id: '', label: '', kind: 'number', value: 0, text: '', formula: '', description: '', group: '' };
  // Normalise to the multi-roll array (migrating a legacy single `roll`).
  if (!Array.isArray(v.rolls)) v.rolls = v.roll ? [{ name: '', expr: v.roll }] : [];
  let idDraft = v.id;

  state.overlay = {
    render() {
      const validate = () => {
        // live-validate the formula/roll -> show ERR hint
        if (v.kind === 'calc') {
          const test = computeAll([...c.values.filter((x) => x.id !== v.id), { ...v, id: v.id || '__tmp__' }]);
          const r = test.results.get(v.id || '__tmp__');
          const d = test.details.get(v.id || '__tmp__');
          return r === 'ERR' ? (d?.error || 'error') : null;
        }
        return null;
      };
      const err = validate();

      const idField = creating
        ? el('input', { placeholder: 'lowercase_slug', value: idDraft, oninput: (e) => { idDraft = e.target.value; } })
        : el('input', { class: 'locked', value: v.id, readonly: true, title: 'Value ids are immutable — formulas reference them.' });

      const kindSeg = el('div', { class: 'seg' }, ['number', 'text', 'calc'].map((k) => el('button', { class: v.kind === k ? 'on' : '', text: k, onclick: () => { v.kind = k; render(); } })));

      const kindFields = el('div');
      if (v.kind === 'number') kindFields.append(field('Value', el('input', { type: 'number', value: v.value ?? 0, oninput: (e) => { v.value = Number(e.target.value); } })));
      if (v.kind === 'text') kindFields.append(field('Text', el('input', { value: v.text || '', oninput: (e) => { v.text = e.target.value; } })));
      if (v.kind === 'calc') kindFields.append(field('Formula (no dice)', el('input', { value: v.formula || '', placeholder: '10 + dex_mod', oninput: (e) => { v.formula = e.target.value; render(); } }), err ? `ERR — ${err}` : 'Deterministic. Other values may depend on this.'));

      return sheetCard([
        el('h2', { text: creating ? 'New value' : 'Edit value' }),
        field(creating ? 'ID (slug, permanent)' : 'ID (locked)', idField, creating ? 'Lowercase, starts with a letter. Cannot change later.' : 'Immutable — rename the label instead.'),
        field('Label', el('input', { value: v.label || '', placeholder: 'Display name', oninput: (e) => { v.label = e.target.value; } })),
        field('Kind', kindSeg),
        kindFields,
        el('div', { class: 'field' }, [
          el('label', { text: 'Rolls (dice allowed) — e.g. Attack, Damage' }),
          ...v.rolls.map((r, i) => el('div', { class: 'rolledit' }, [
            el('input', { class: 'rn-in', placeholder: 'Name', value: r.name || '', oninput: (e) => { r.name = e.target.value; } }),
            el('input', { class: 're-in', placeholder: '1d20 + str_mod', value: r.expr || '', oninput: (e) => { r.expr = e.target.value; } }),
            el('button', { class: 'rrm', text: '×', title: 'Remove roll', onclick: () => { v.rolls.splice(i, 1); render(); } }),
          ])),
          el('button', { class: 'btn ghost', style: 'margin-top:4px', text: '+ Add roll', onclick: () => { v.rolls.push({ name: '', expr: '' }); render(); } }),
          el('div', { class: 'hint', text: 'Each roll becomes its own button in the detail view. Nothing may depend on a roll.' }),
        ]),
        field('Description (shown on detail)', el('input', { value: v.description || '', oninput: (e) => { v.description = e.target.value; } })),
        field('Group (editor organisation)', el('input', { value: v.group || '', oninput: (e) => { v.group = e.target.value; } })),
        el('div', { class: 'btnrow' }, [
          !creating ? el('button', { class: 'btn danger', text: 'Delete', onclick: () => deleteValue(v) }) : null,
          el('button', { class: 'btn ghost', text: 'Cancel', onclick: closeOverlay }),
          el('button', { class: 'btn primary', text: 'Save', onclick: () => saveValue() }),
        ]),
      ]);

      function saveValue() {
        // normalise empties
        if (v.kind !== 'number') v.value = undefined;
        if (v.kind !== 'text') v.text = v.kind === 'text' ? v.text : undefined;
        if (v.kind !== 'calc') v.formula = undefined;
        delete v.roll; // standardise on the rolls[] array
        v.rolls = (v.rolls || []).filter((r) => r && r.expr && r.expr.trim())
          .map((r) => ({ name: (r.name || '').trim(), expr: r.expr.trim() }));
        if (!v.rolls.length) delete v.rolls;
        if (creating) {
          const id = (idDraft || '').trim();
          if (!SLUG_RE.test(id)) { toast('ID must be a lowercase slug (a–z, 0–9, _).'); return; }
          if (c.values.some((x) => x.id === id)) { toast(`ID "${id}" already exists.`); return; }
          v.id = id;
          if (!v.label) v.label = id;
          c.values.push(v);
          state.overlay = null;
          commit();
          if (onCreate) { onCreate(v); }
          return;
        }
        closeOverlay(); commit();
      }
    },
  };
  render();
}
function field(label, input, hint) {
  return el('div', { class: 'field' }, [el('label', { text: label }), input, hint ? el('div', { class: `hint ${/^ERR/.test(hint) ? 'err' : ''}`, text: hint }) : null]);
}
function deleteValue(v) {
  const c = activeChar();
  const dependents = c.values.filter((x) => x.kind === 'calc' && new RegExp(`\\b${v.id}\\b`).test(x.formula || ''));
  confirmDialog({
    title: `Delete value “${v.label || v.id}”?`,
    message: dependents.length
      ? `${dependents.length} formula(s) reference “${v.id}” and will show ERR after deletion. Widgets bound to it are removed.`
      : 'Removes the value and any widgets bound to it. This cannot be undone.',
    confirmLabel: '🗑 Delete value',
    onConfirm: () => {
      c.values = c.values.filter((x) => x.id !== v.id);
      c.pages.forEach((p) => {
        p.widgets = p.widgets.filter((w) => !(w.kind === 'bound' && w.ref === v.id));
        p.widgets.forEach((w) => { if (w.secondaryRef === v.id) w.secondaryRef = undefined; });
      });
      closeOverlay(); commitNow();
    },
  });
}

// ============================================================ SHARE / IMPORT (C3/C4)
function openShare() {
  state.overlay = {
    render() {
      const c = activeChar();
      const items = [];
      if (c) {
        items.push(el('button', { onclick: () => { const { filename, json } = store.exportCharacter(c); store.download(filename, json); toast('Character exported.'); } }, [el('span', { class: 'mi', text: '☺' }), `Export “${c.name}”`]));
        items.push(el('button', { onclick: () => { const { filename, json } = store.exportPack(c, c.name); store.download(filename, json); toast('Pack exported.'); } }, [el('span', { class: 'mi', text: '❑' }), 'Export as pack (values + layout)']));
      }
      items.push(el('button', { onclick: () => { const { filename, json } = store.exportEverything(state.save); store.download(filename, json); toast('Full backup exported.'); } }, [el('span', { class: 'mi', text: '⛃' }), 'Export everything (backup)']));
      items.push(el('button', { onclick: pickImportFile }, [el('span', { class: 'mi', text: '↧' }), 'Import a .json file']));

      return sheetCard([
        el('h2', { text: 'Share & backup' }),
        el('p', { class: 'desc', text: 'JSON files are the only backup and the share format — no server, no accounts.' }),
        el('div', { class: 'menu-list' }, items),
        el('div', { class: 'btnrow' }, [el('button', { class: 'btn ghost', text: 'Close', onclick: closeOverlay })]),
      ]);
    },
  };
  render();
}

function pickImportFile() {
  const input = $('#file-input');
  input.value = '';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      let data;
      try { data = JSON.parse(reader.result); } catch { toast('Not valid JSON.'); return; }
      handleImport(data);
    };
    reader.readAsText(file);
  };
  input.click();
}

function handleImport(data) {
  const analysis = store.analyzeImport(data);
  if (analysis.type === 'refused' || analysis.type === 'invalid') { alert(analysis.reason); return; }

  if (analysis.type === 'savefile') {
    const { added } = store.importSaveFile(state.save, analysis.save);
    state.overlay = null; state.view = 'home';
    commit();
    toast(`Imported ${added.length} character(s).`);
    return;
  }

  // pack — needs a target character; show conflict-aware dialog (C4)
  const c = activeChar();
  if (!c) { toast('Open a character first to import a pack into it.'); return; }
  openPackImport(c, analysis.pack);
}

function openPackImport(c, pack) {
  // detect collisions
  const existingIds = new Set(c.values.map((v) => v.id));
  const collisions = pack.values.filter((v) => existingIds.has(v.id)).map((v) => v.id);
  let mode = 'suffix';
  state.overlay = {
    render() {
      return sheetCard([
        el('h2', { text: `Import pack: ${pack.name || 'Untitled'}` }),
        el('p', { class: 'desc', text: `${pack.values.length} value(s)${pack.pages ? `, ${pack.pages.length} page(s)` : ''} → into “${c.name}”. Non-destructive: your existing values are never overwritten.` }),
        collisions.length ? el('div', { class: 'warnbanner' }, [el('span', { text: '⚠' }), el('span', { text: `${collisions.length} id collision(s): ${collisions.slice(0, 5).join(', ')}${collisions.length > 5 ? '…' : ''}` })]) : el('p', { class: 'desc', text: 'No id collisions.' }),
        collisions.length ? el('div', { class: 'field' }, [
          el('label', { text: 'On collision' }),
          el('div', { class: 'seg small' }, [
            el('button', { class: mode === 'suffix' ? 'on' : '', text: 'Import suffixed (id_2)', onclick: () => { mode = 'suffix'; render(); } }),
            el('button', { class: mode === 'skip' ? 'on' : '', text: 'Skip colliding', onclick: () => { mode = 'skip'; render(); } }),
          ]),
        ]) : null,
        el('div', { class: 'btnrow' }, [
          el('button', { class: 'btn ghost', text: 'Cancel', onclick: closeOverlay }),
          el('button', { class: 'btn primary', text: 'Import', onclick: () => {
            const res = store.importPackInto(c, pack, { mode, addPages: true });
            state.overlay = null; commit();
            toast(`Added ${res.addedValues} value(s)${res.renamed ? `, ${res.renamed} renamed` : ''}.`);
          } }),
        ]),
      ]);
    },
  };
  render();
}

// --- boot ------------------------------------------------------------------
applyTheme(state.theme);
if (new URLSearchParams(location.search).get('sheet') && state.save.activeCharacterId) state.view = 'sheet';
render();
// expose a little for console tinkering
window.parchment = { state, store };

})();
  </script>
</body>
