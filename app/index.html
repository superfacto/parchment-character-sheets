<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#7a2b2b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Parchment" />

  <title>Parchment — D&D Character Sheets</title>
  <meta name="description" content="Build and use tabletop-RPG character sheets. A generic value/formula/dice engine with an editable D&D 5e preset. Works offline, installable, no accounts, no tracking." />
  <link rel="canonical" href="https://parchment-character-sheets.netlify.app/" />

  <!-- Icons -->
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="icon" href="./favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="mask-icon" href="./icon.svg" color="#7a2b2b" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- Open Graph (Facebook, iMessage, Slack, Discord, etc.) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Parchment" />
  <meta property="og:title" content="Parchment — D&D Character Sheets" />
  <meta property="og:description" content="Offline, installable character-sheet builder: generic value/formula/dice engine + editable D&D 5e preset. No accounts, no tracking — your data stays on your device." />
  <meta property="og:url" content="https://parchment-character-sheets.netlify.app/" />
  <meta property="og:image" content="https://parchment-character-sheets.netlify.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Parchment — D&D character sheets, offline, no accounts" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Parchment — D&D Character Sheets" />
  <meta name="twitter:description" content="Offline, installable character-sheet builder with an editable D&D 5e preset. No accounts, no tracking." />
  <meta name="twitter:image" content="https://parchment-character-sheets.netlify.app/og-image.png" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app"></div>
  <input id="file-input" type="file" accept="application/json,.json" hidden />
  <script type="module" src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
