<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Full-bleed background so platform masks (Android adaptive icons, iOS) don't
       reveal transparent corners; logo kept inside the ~80% safe zone. -->
  <rect width="512" height="512" fill="#efe9dd"/>
  <g transform="translate(256 256) scale(0.84)">
    <polygon points="0,-124 107,-62 107,62 0,124 -107,62 -107,-62" fill="#fdfcfa" stroke="#7a2b2b" stroke-width="18" stroke-linejoin="round"/>
    <text x="0" y="55" font-family="Georgia, 'Times New Roman', serif" font-size="170" font-weight="700" fill="#7a2b2b" text-anchor="middle">P</text>
  </g>
</svg>
